<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail OTP Fetcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: #888; margin-top: 0.4rem; }
    .card {
      background: #1a1a23;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #2a2a35;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #12121a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus { border-color: #6366f1; }
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; width: 100%; }
    .btn-primary:hover { background: #5558e6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #2a2a35; color: #ccc; }
    .btn-secondary:hover { background: #333340; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status { color: #888; font-size: 0.9rem; }
    .status.loading { color: #f0c040; }
    .status.connected { color: #6f6; }
    .status.error { color: #f66; }
    .email-item {
      padding: 1rem;
      border-radius: 10px;
      background: #14141e;
      border: 1px solid #222;
      margin-bottom: 0.5rem;
    }
    .email-item .from { font-size: 0.8rem; color: #888; }
    .email-item .subject { font-size: 0.85rem; color: #ccc; margin-top: 0.2rem; }
    .email-item .codes {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .otp-code {
      background: #0a2a1a;
      border: 1px solid #2a6a3a;
      color: #6f6;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .otp-code:hover { background: #1a4a2a; }
    .otp-code.copied { background: #2a6a3a; }
    .empty { text-align: center; padding: 3rem; color: #555; }
    .empty .big { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .hidden { display: none; }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #2a6a3a; color: #fff; padding: 0.75rem 1.5rem;
      border-radius: 12px; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }
    .tip {
      font-size: 0.8rem; color: #666; margin-top: 0.5rem;
      text-align: center;
    }
    .tip a { color: #a78bfa; }
    .toolbar { margin-bottom: 1rem; }
    @media (max-width: 500px) {
      .header h1 { font-size: 1.5rem; }
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✉ Gmail OTP Fetcher</h1>
      <p>Fetch OTP codes from your Gmail inbox — 100% free</p>
    </div>

    <div class="card" id="loginCard">
      <div class="form-group">
        <label>Gmail Address</label>
        <input type="email" id="emailInput" placeholder="youraccount@gmail.com">
      </div>
      <div class="form-group">
        <label>App Password</label>
        <input type="password" id="passInput" placeholder="16-character app password">
      </div>
      <button class="btn btn-primary" id="loginBtn">🔓 Connect & Fetch OTPs</button>
      <div class="tip">
        Need an App Password?
        <a href="https://myaccount.google.com/apppasswords" target="_blank">Generate here</a>
        (Enable 2FA first)
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="status-bar">
        <span class="status" id="statusText">○ Ready</span>
        <button class="btn btn-secondary" id="fetchBtn">⟳ Refresh OTPs</button>
      </div>
      <div id="otpList"><div class="empty"><span class="big">📭</span>No OTPs</div></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function() {
      const emailInput = document.getElementById('emailInput');
      const passInput = document.getElementById('passInput');
      const loginBtn = document.getElementById('loginBtn');
      const loginCard = document.getElementById('loginCard');
      const resultCard = document.getElementById('resultCard');
      const fetchBtn = document.getElementById('fetchBtn');
      const statusText = document.getElementById('statusText');
      const otpList = document.getElementById('otpList');
      const toast = document.getElementById('toast');

      let savedEmail = '';
      let savedPass = '';

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      function renderOTPs(data) {
        if (!data || data.length === 0) {
          otpList.innerHTML = '<div class="empty"><span class="big">📭</span>No OTP emails found</div>';
          return;
        }
        let html = '';
        data.forEach(item => {
          const codes = item.otps || [];
          html += '<div class="email-item">';
          html += '<div class="from">' + escapeHtml(item.from) + ' &middot; ' + escapeHtml(item.subject) + '</div>';
          if (codes.length > 0) {
            html += '<div class="codes">';
            codes.forEach(c => {
              html += '<span class="otp-code" onclick="window.copyOTP(\'' + c + '\')">' + c + '</span>';
            });
            html += '</div>';
          }
          if (!codes.length && item.snippet) {
            html += '<div class="subject">' + escapeHtml(item.snippet) + '</div>';
          }
          html += '</div>';
        });
        otpList.innerHTML = html;
        showToast('Found ' + data.length + ' emails');
      }

      window.copyOTP = function(text) {
        navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text));
      };

      function setStatus(text, cls) {
        statusText.textContent = text;
        statusText.className = 'status' + (cls ? ' ' + cls : '');
      }

      async function fetchOTPs() {
        setStatus('⟳ Fetching...', 'loading');
        loginBtn.disabled = true;
        try {
          const res = await fetch('/api/fetch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: savedEmail, password: savedPass }),
          });
          const data = await res.json();
          if (data.error) {
            setStatus('✕ ' + data.error, 'error');
            showToast('Error: ' + data.error);
          } else if (data.otps) {
            setStatus('● Connected — ' + data.otps.length + ' emails', 'connected');
            renderOTPs(data.otps);
            loginCard.classList.add('hidden');
            resultCard.classList.remove('hidden');
          }
        } catch (err) {
          setStatus('✕ Connection failed', 'error');
          showToast('Connection failed');
        }
        loginBtn.disabled = false;
      }

      async function handleLogin() {
        const email = emailInput.value.trim();
        const pass = passInput.value.trim();
        if (!email || !pass) {
          showToast('Enter email and app password');
          return;
        }
        savedEmail = email;
        savedPass = pass;
        await fetchOTPs();
      }

      loginBtn.addEventListener('click', handleLogin);
      fetchBtn.addEventListener('click', fetchOTPs);

      emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });
      passInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    })();
  </script>
</body>
</html>
