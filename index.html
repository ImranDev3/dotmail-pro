<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Email Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #888;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a23;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #2a2a35;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .input-group input {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #12121a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .input-group input:focus {
      border-color: #6366f1;
    }

    .input-group input::placeholder {
      color: #555;
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-generate {
      background: #6366f1;
      color: #fff;
    }

    .btn-generate:hover {
      background: #5558e6;
    }

    .btn-refresh {
      background: #2a2a35;
      color: #ccc;
    }

    .btn-refresh:hover {
      background: #333340;
    }

    .btn-clear {
      background: #3f1f1f;
      color: #e0a0a0;
    }

    .btn-clear:hover {
      background: #4f2828;
    }

    .btn-export {
      background: #1f3f2f;
      color: #a0e0b0;
    }

    .btn-export:hover {
      background: #284f38;
    }

    .btn-copy-all {
      background: #2a2a35;
      color: #a0c0e0;
    }

    .btn-copy-all:hover {
      background: #333340;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      color: #777;
      border-top: 1px solid #222;
      margin-top: 1rem;
    }

    .email-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 60vh;
      overflow-y: auto;
    }

    .email-list::-webkit-scrollbar {
      width: 6px;
    }

    .email-list::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 8px;
    }

    .email-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      background: #14141e;
      border: 1px solid #222;
      transition: all 0.2s;
      gap: 0.5rem;
    }

    .email-item:hover {
      border-color: #333;
    }

    .email-item.copied {
      background: #0a2a1a;
      border-color: #2a6a3a;
    }

    .email-item.copied .email-text {
      color: #6f6;
    }

    .email-text {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      flex: 1;
    }

    .badge {
      font-size: 0.7rem;
      background: #2a6a3a;
      color: #8f8;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      display: none;
    }

    .email-item.copied .badge {
      display: inline-block;
    }

    .copy-btn {
      padding: 0.35rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: #2a2a35;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #3a3a48;
      color: #fff;
    }

    .email-item.copied .copy-btn {
      background: #1a4a2a;
      color: #8f8;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #555;
    }

    .empty-state span {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #2a6a3a;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 500px) {
      .header h1 { font-size: 1.5rem; }
      .card { padding: 1rem; }
      .input-group input { min-width: 100%; }
      .email-text { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✦ Dot Email Generator</h1>
      <p>Generate dot variations of any Gmail / Outlook email</p>
    </div>

    <div class="card">
      <div class="input-group">
        <input type="email" id="emailInput" placeholder="Enter email e.g. example@gmail.com" autofocus>
        <button class="btn btn-generate" id="generateBtn">Generate</button>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <div class="toolbar">
        <button class="btn btn-refresh" id="refreshBtn">⟳ Refresh</button>
        <button class="btn btn-copy-all" id="copyAllBtn">📋 Copy All</button>
        <button class="btn btn-export" id="exportBtn">📥 Export .txt</button>
        <button class="btn btn-clear" id="clearBtn">🗑 Clear</button>
      </div>

      <div class="email-list" id="emailList"></div>

      <div class="stats">
        <span id="totalCount">0 emails</span>
        <span id="copiedCount">0 copied</span>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function() {
      const STORAGE_KEY = 'dotmail_data';

      const emailInput = document.getElementById('emailInput');
      const generateBtn = document.getElementById('generateBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const copyAllBtn = document.getElementById('copyAllBtn');
      const exportBtn = document.getElementById('exportBtn');
      const clearBtn = document.getElementById('clearBtn');
      const emailList = document.getElementById('emailList');
      const resultCard = document.getElementById('resultCard');
      const totalCount = document.getElementById('totalCount');
      const copiedCount = document.getElementById('copiedCount');
      const toast = document.getElementById('toast');

      let currentEmail = '';
      let currentVariations = [];

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (_) {}
        return { variations: [], copied: {} };
      }

      function saveState(variations, copied) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ variations, copied }));
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
      }

      function getUsernameAndDomain(email) {
        const parts = email.trim().split('@');
        return { username: parts[0], domain: parts[1] };
      }

      function generateDotVariations(username) {
        const n = username.length;
        if (n < 2) return [username];

        const limit = Math.min(100, Math.pow(2, n - 1));
        const result = [];

        for (let mask = 1; mask < limit; mask++) {
          let variant = '';
          for (let i = 0; i < n; i++) {
            variant += username[i];
            if ((mask & (1 << i)) && i < n - 1) {
              variant += '.';
            }
          }
          result.push(variant);
        }

        return result;
      }

      function render(variations, copied) {
        emailList.innerHTML = '';

        if (!variations || variations.length === 0) {
          emailList.innerHTML = '<div class="empty-state"><span>📭</span>No emails generated yet</div>';
          resultCard.style.display = 'none';
          return;
        }

        resultCard.style.display = 'block';

        variations.forEach(email => {
          const isCopied = copied[email] === true;

          const item = document.createElement('div');
          item.className = 'email-item' + (isCopied ? ' copied' : '');

          const textSpan = document.createElement('span');
          textSpan.className = 'email-text';
          textSpan.textContent = email;

          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'Copied';

          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = isCopied ? 'Copied' : 'Copy';
          btn.dataset.email = email;

          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            copySingle(email, variations, copied);
          });

          item.appendChild(textSpan);
          item.appendChild(badge);
          item.appendChild(btn);
          emailList.appendChild(item);
        });

        updateStats(variations, copied);
      }

      function updateStats(variations, copied) {
        const copiedKeys = Object.keys(copied).filter(k => copied[k]);
        totalCount.textContent = variations.length + ' emails';
        copiedCount.textContent = copiedKeys.length + ' copied';
      }

      function copySingle(email, variations, copied) {
        navigator.clipboard.writeText(email).then(() => {
          copied[email] = true;
          saveState(variations, copied);
          render(variations, copied);
          showToast('Copied: ' + email);
        }).catch(() => {
          fallbackCopy(email, variations, copied);
        });
      }

      function fallbackCopy(text, variations, copied) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          copied[text] = true;
          saveState(variations, copied);
          render(variations, copied);
          showToast('Copied: ' + text);
        } catch (_) {
          showToast('Copy failed');
        }
        document.body.removeChild(ta);
      }

      function copyAll(variations, copied) {
        const text = variations.join('\n');
        navigator.clipboard.writeText(text).then(() => {
          variations.forEach(email => { copied[email] = true; });
          saveState(variations, copied);
          render(variations, copied);
          showToast('Copied ' + variations.length + ' emails');
        }).catch(() => {
          showToast('Copy All failed');
        });
      }

      function exportTxt(variations) {
        const text = variations.join('\n');
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'dotmail_' + currentEmail.split('@')[0] + '.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Exported as .txt');
      }

      function clearAll() {
        localStorage.removeItem(STORAGE_KEY);
        currentVariations = [];
        currentEmail = '';
        render([], {});
        emailInput.value = '';
        emailInput.focus();
        showToast('Cleared all data');
      }

      function generateAndRender(email) {
        const trimmed = email.trim();
        if (!isValidEmail(trimmed)) {
          showToast('Please enter a valid email');
          return;
        }

        const { username, domain } = getUsernameAndDomain(trimmed);
        const dots = generateDotVariations(username);
        const variations = dots.map(d => d + '@' + domain);

        const state = loadState();

        const existingVariations = state.variations || [];
        const existingCopied = state.copied || {};

        const mergedMap = new Map();
        existingVariations.forEach(v => mergedMap.set(v, true));
        variations.forEach(v => mergedMap.set(v, true));
        const merged = Array.from(mergedMap.keys());

        const copied = { ...existingCopied };

        currentVariations = merged;
        currentEmail = trimmed;

        saveState(merged, copied);
        render(merged, copied);
        showToast('Generated ' + variations.length + ' dot variations');
      }

      function refresh() {
        if (!currentEmail) {
          showToast('No email to regenerate');
          return;
        }
        generateAndRender(currentEmail);
      }

      function handleGenerate() {
        const email = emailInput.value.trim();
        if (!email) {
          showToast('Please enter an email first');
          return;
        }
        currentEmail = email;
        generateAndRender(email);
      }

      function handleKeydown(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleGenerate();
        }
      }

      function init() {
        emailInput.addEventListener('keydown', handleKeydown);
        generateBtn.addEventListener('click', handleGenerate);
        refreshBtn.addEventListener('click', refresh);
        clearBtn.addEventListener('click', clearAll);
        copyAllBtn.addEventListener('click', function() {
          const state = loadState();
          const v = state.variations || [];
          const c = state.copied || {};
          if (v.length === 0) { showToast('No emails to copy'); return; }
          copyAll(v, c);
        });
        exportBtn.addEventListener('click', function() {
          const state = loadState();
          const v = state.variations || [];
          if (v.length === 0) { showToast('No emails to export'); return; }
          exportTxt(v);
        });

        const state = loadState();
        const v = state.variations || [];
        const c = state.copied || {};
        if (v.length > 0) {
          currentVariations = v;
          render(v, c);
        }
      }

      init();
    })();
  </script>
</body>
</html>
