<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Email Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #888;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .header .sub-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: #6366f1;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid #333;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      transition: all 0.2s;
    }

    .header .sub-link:hover {
      border-color: #6366f1;
      background: #6366f110;
    }

    .card {
      background: #1a1a23;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #2a2a35;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .input-group input[type="email"] {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #12121a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .input-group input[type="email"]:focus {
      border-color: #6366f1;
    }

    .input-group input[type="email"]::placeholder {
      color: #555;
    }

    .count-input {
      width: 80px;
      padding: 0.75rem 0.5rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #12121a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      text-align: center;
      transition: border 0.2s;
    }

    .count-input:focus {
      border-color: #6366f1;
    }

    .count-input::-webkit-inner-spin-button {
      opacity: 1;
    }

    .input-group .count-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #888;
      font-size: 0.85rem;
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-generate {
      background: #6366f1;
      color: #fff;
    }

    .btn-generate:hover {
      background: #5558e6;
    }

    .btn-refresh {
      background: #2a2a35;
      color: #ccc;
    }

    .btn-refresh:hover {
      background: #333340;
    }

    .btn-clear {
      background: #3f1f1f;
      color: #e0a0a0;
    }

    .btn-clear:hover {
      background: #4f2828;
    }

    .btn-export {
      background: #1f3f2f;
      color: #a0e0b0;
    }

    .btn-export:hover {
      background: #284f38;
    }

    .btn-copy-all {
      background: #2a2a35;
      color: #a0c0e0;
    }

    .btn-copy-all:hover {
      background: #333340;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      background: #1a1a23;
      z-index: 10;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #222;
      margin-bottom: 0.75rem;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0 0 0;
      font-size: 0.85rem;
      color: #888;
    }

    .stats .num {
      color: #a78bfa;
      font-weight: 700;
    }

    .email-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 55vh;
      overflow-y: auto;
    }

    .email-list::-webkit-scrollbar {
      width: 6px;
    }

    .email-list::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 8px;
    }

    .main-email-box {
      background: #12121a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 1rem;
      color: #a78bfa;
      word-break: break-all;
      cursor: pointer;
      transition: border 0.2s;
    }

    .main-email-box:hover {
      border-color: #6366f1;
    }

    .main-email-box .label {
      font-size: 0.75rem;
      color: #666;
      font-family: 'Segoe UI', sans-serif;
      display: block;
      margin-bottom: 0.25rem;
    }

    .email-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      background: #14141e;
      border: 1px solid #222;
      transition: all 0.2s;
      gap: 0.5rem;
      cursor: pointer;
    }

    .email-item:hover {
      border-color: #6366f1;
    }

    .email-item.copied {
      background: #0a2a1a;
      border-color: #2a6a3a;
    }

    .email-item.copied .email-text {
      color: #6f6;
    }

    .serial {
      font-size: 0.8rem;
      color: #555;
      min-width: 2.5rem;
      text-align: right;
      font-family: 'Segoe UI', sans-serif;
    }

    .email-text {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      flex: 1;
      margin-left: 0.5rem;
    }

    .badge {
      font-size: 0.7rem;
      background: #2a6a3a;
      color: #8f8;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      display: none;
    }

    .email-item.copied .badge {
      display: inline-block;
    }

    .copy-btn {
      padding: 0.35rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: #2a2a35;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #3a3a48;
      color: #fff;
    }

    .email-item.copied .copy-btn {
      background: #1a4a2a;
      color: #8f8;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #555;
    }

    .empty-state span {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #2a6a3a;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 500px) {
      .header h1 { font-size: 1.5rem; }
      .card { padding: 1rem; }
      .input-group input { min-width: 100%; }
      .email-text { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✦ DotMail Pro</h1>
      <p>Auto OTP fetch + Email generator</p>
    </div>

    <div class="card" id="loginCard">
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:end;">
        <div style="flex:1;min-width:200px;">
          <label style="display:block;font-size:0.8rem;color:#888;margin-bottom:0.3rem;">Gmail</label>
          <input type="email" id="otpEmailInput" placeholder="youraccount@gmail.com" style="width:100%;padding:0.6rem 1rem;border-radius:10px;border:1px solid #333;background:#12121a;color:#e0e0e0;font-size:0.9rem;outline:none;">
        </div>
        <div style="flex:1;min-width:200px;">
          <label style="display:block;font-size:0.8rem;color:#888;margin-bottom:0.3rem;">App Password</label>
          <input type="password" id="otpPassInput" placeholder="16-char password" style="width:100%;padding:0.6rem 1rem;border-radius:10px;border:1px solid #333;background:#12121a;color:#e0e0e0;font-size:0.9rem;outline:none;">
        </div>
        <button class="btn btn-generate" id="otpConnectBtn" style="padding:0.6rem 1.2rem;white-space:nowrap;">🔌 Connect</button>
        <button class="btn btn-refresh" id="otpDisconnectBtn" style="padding:0.6rem 1.2rem;display:none;">🚪 Disconnect</button>
      </div>
      <div id="otpPollStatus" style="font-size:0.8rem;color:#666;margin-top:0.5rem;"></div>
    </div>

    <div class="card" id="otpResultCard" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;">
        <span style="font-size:0.85rem;color:#aaa;">📬 OTP Codes</span>
        <button class="btn btn-refresh" id="clearOtpListBtn" style="font-size:0.8rem;padding:0.2rem 0.6rem;">Clear</button>
      </div>
      <div id="otpEmailList" style="display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:0.5rem;"></div>
    </div>

    <div class="card">
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:end;">
        <div style="flex:1;min-width:150px;">
          <label style="display:block;font-size:0.8rem;color:#888;margin-bottom:0.3rem;">Country Code</label>
          <select id="countryCodeSelect" style="width:100%;padding:0.6rem 0.8rem;border-radius:10px;border:1px solid #333;background:#12121a;color:#e0e0e0;font-size:0.9rem;outline:none;">
            <option value="+1">🇺🇸 US +1</option>

            <option value="+966">🇸🇦 SA +966</option>
            <option value="+971">🇦🇪 AE +971</option>

        </div>
        <div style="flex:1;min-width:150px;">
          <label style="display:block;font-size:0.8rem;color:#888;margin-bottom:0.3rem;">Count</label>
          <input type="number" id="phoneCountInput" value="20" min="1" max="200" style="width:100%;padding:0.6rem 0.8rem;border-radius:10px;border:1px solid #333;background:#12121a;color:#e0e0e0;font-size:0.9rem;outline:none;">
        </div>
        <button class="btn btn-generate" id="phoneGenBtn" style="padding:0.6rem 1.2rem;">📱 Generate</button>

    <div class="toast" id="toast"></div>
    <div id="otpPopup" style="display:none;position:fixed;top:1rem;right:1rem;background:#1a2a1a;border:1px solid #2a6a3a;border-radius:16px;padding:1rem 1.5rem;z-index:200;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideIn 0.3s;">
      <div style="font-size:0.7rem;color:#888;margin-bottom:0.3rem;">🔔 New OTP Received</div>
      <div id="popupCodes" style="font-size:1.5rem;font-weight:700;color:#6f6;font-family:monospace;display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.3rem;"></div>
      <div id="popupFrom" style="font-size:0.75rem;color:#aaa;margin-top:0.3rem;"></div>
      <button onclick="document.getElementById('otpPopup').style.display='none'" style="position:absolute;top:0.5rem;right:0.75rem;background:none;border:none;color:#666;cursor:pointer;font-size:1.2rem;">✕</button>
    </div>
    <style>
      @keyframes slideIn { from { transform:translateX(100px);opacity:0; } to { transform:translateX(0);opacity:1; } }
      @keyframes popIn { 0%{transform:scale(0.8);opacity:0;} 50%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
      @keyframes copiedFlash { 0%{box-shadow:0 0 0 0 rgba(100,255,100,0.6);} 100%{box-shadow:0 0 20px 10px rgba(100,255,100,0);} }
      .otp-chip { animation:popIn 0.3s ease; }
      .otp-chip.copied { animation:copiedFlash 0.5s ease; background:#1a4a2a !important; }
    </style>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    (function() {
      const STORAGE_KEY = 'dotmail_data';

      const emailInput = document.getElementById('emailInput');
      const countInput = document.getElementById('countInput');
      const generateBtn = document.getElementById('generateBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const copyAllBtn = document.getElementById('copyAllBtn');
      const exportBtn = document.getElementById('exportBtn');
      const clearBtn = document.getElementById('clearBtn');
      const emailList = document.getElementById('emailList');
      const mainEmailBox = document.getElementById('mainEmailBox');
      const mainEmailText = document.getElementById('mainEmailText');
      const resultCard = document.getElementById('resultCard');
      const totalCount = document.getElementById('totalCount');
      const copiedCount = document.getElementById('copiedCount');
      const toast = document.getElementById('toast');

      let currentEmail = '';
      let currentVariations = [];

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (_) {}
        return { mainEmail: '', variations: [], copied: {} };
      }

      function saveState(variations, copied, mainEmail) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ mainEmail: mainEmail || '', variations, copied }));
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
      }

      function getUsernameAndDomain(email) {
        const parts = email.trim().split('@');
        return { username: parts[0], domain: parts[1] };
      }

      function generateDotVariations(username, maxCount) {
        const n = username.length;
        if (n < 2) return [username];

        const totalPossible = Math.pow(2, n - 1) - 1;
        const limit = Math.min(maxCount, totalPossible);
        const result = [];

        for (let mask = 1; mask <= totalPossible && result.length < limit; mask++) {
          let variant = '';
          for (let i = 0; i < n; i++) {
            variant += username[i];
            if ((mask & (1 << i)) && i < n - 1) {
              variant += '.';
            }
          }
          result.push(variant);
        }

        return result;
      }

      function render(variations, copied) {
        emailList.innerHTML = '';

        if (!variations || variations.length === 0) {
          emailList.innerHTML = '<div class="empty-state"><span>📭</span>No emails generated yet</div>';
          mainEmailBox.style.display = 'none';
          resultCard.style.display = 'none';
          return;
        }

        resultCard.style.display = 'block';

        if (currentEmail) {
          mainEmailText.textContent = currentEmail;
          mainEmailBox.style.display = 'block';
          mainEmailBox.onclick = function() {
            copySingle(currentEmail, variations, copied);
          };
        }

        variations.forEach((email, idx) => {
          const isCopied = copied[email] === true;

          const item = document.createElement('div');
          item.className = 'email-item' + (isCopied ? ' copied' : '');

          const serialSpan = document.createElement('span');
          serialSpan.className = 'serial';
          serialSpan.textContent = '#' + (idx + 1);

          const textSpan = document.createElement('span');
          textSpan.className = 'email-text';
          textSpan.textContent = email;

          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'Copied';

          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = isCopied ? 'Copied' : 'Copy';
          btn.dataset.email = email;

          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            copySingle(email, variations, copied);
          });

          item.addEventListener('click', function() {
            copySingle(email, variations, copied);
          });

          item.appendChild(serialSpan);
          item.appendChild(textSpan);
          item.appendChild(badge);
          item.appendChild(btn);
          emailList.appendChild(item);
        });

        updateStats(variations, copied);
      }

      function updateStats(variations, copied) {
        const copiedKeys = Object.keys(copied).filter(k => copied[k]);
        totalCount.innerHTML = '<span class="num">' + variations.length + '</span> emails';
        copiedCount.innerHTML = '<span class="num">' + copiedKeys.length + '</span> copied';
      }

      function copySingle(email, variations, copied) {
        navigator.clipboard.writeText(email).then(() => {
          copied[email] = true;
          saveState(variations, copied, currentEmail);
          render(variations, copied);
          showToast('Copied: ' + email);
        }).catch(() => {
          fallbackCopy(email, variations, copied);
        });
      }

      function fallbackCopy(text, variations, copied) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          copied[text] = true;
          saveState(variations, copied, currentEmail);
          render(variations, copied);
          showToast('Copied: ' + text);
        } catch (_) {
          showToast('Copy failed');
        }
        document.body.removeChild(ta);
      }

      function copyAll(variations, copied) {
        const text = variations.join('\n');
        navigator.clipboard.writeText(text).then(() => {
          variations.forEach(email => { copied[email] = true; });
          saveState(variations, copied, currentEmail);
          render(variations, copied);
          showToast('Copied ' + variations.length + ' emails');
        }).catch(() => {
          showToast('Copy All failed');
        });
      }

      function exportTxt(variations) {
        const text = variations.join('\n');
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'dotmail_' + currentEmail.split('@')[0] + '.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Exported as .txt');
      }

      function clearAll() {
        localStorage.removeItem(STORAGE_KEY);
        currentVariations = [];
        currentEmail = '';
        mainEmailBox.style.display = 'none';
        render([], {});
        emailInput.value = '';
        emailInput.focus();
        showToast('Cleared all data');
      }

      function getDesiredCount() {
        const val = parseInt(countInput.value, 10);
        if (isNaN(val) || val < 1) return 50;
        return Math.min(val, 500);
      }

      function generateAndRender(email, keepOld) {
        const trimmed = email.trim();
        if (!isValidEmail(trimmed)) {
          showToast('Please enter a valid email');
          return;
        }

        const desiredCount = getDesiredCount();
        const { username, domain } = getUsernameAndDomain(trimmed);
        const dots = generateDotVariations(username, desiredCount);
        const newVariations = dots.map(d => d + '@' + domain);

        const state = loadState();
        const existingCopied = state.copied || {};

        let finalVariations;
        let copied;

        if (keepOld) {
          const existingVariations = state.variations || [];
          const mergedMap = new Map();
          existingVariations.forEach(v => mergedMap.set(v, true));
          newVariations.forEach(v => mergedMap.set(v, true));
          finalVariations = Array.from(mergedMap.keys());
          copied = { ...existingCopied };
        } else {
          finalVariations = newVariations;
          copied = {};
          newVariations.forEach(v => {
            if (existingCopied[v]) copied[v] = true;
          });
        }

        currentVariations = finalVariations;
        currentEmail = trimmed;

        saveState(finalVariations, copied, currentEmail);
        render(finalVariations, copied);
        showToast('Generated ' + newVariations.length + ' dot variations');
      }

      function refresh() {
        if (!currentEmail) {
          showToast('No email to regenerate');
          return;
        }
        generateAndRender(currentEmail, true);
      }

      function handleGenerate() {
        const email = emailInput.value.trim();
        if (!email) {
          showToast('Please enter an email first');
          return;
        }
        currentEmail = email;
        generateAndRender(email, false);
      }

      function handleKeydown(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleGenerate();
        }
      }

      let pollTimer = null;
      let lastOtpIds = new Set();
      let savedOtpEmail = '';
      let savedOtpPass = '';

      function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

      const receivedOtps = [];

      function playBeep() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      }

      function showOtpPopup(otps, from, subject) {
        const item = { otps, from, subject, time: new Date().toLocaleTimeString() };
        receivedOtps.push(item);
        renderOtpList();
        playBeep();
        const popup = document.getElementById('otpPopup');
        const pc = document.getElementById('popupCodes');
        pc.innerHTML = '';
        otps.forEach(c => {
          const el = document.createElement('span');
          el.textContent = c;
          el.className = 'otp-chip';
          el.style.cssText = 'padding:0.2rem 0.6rem;font-size:1.2rem;';
          el.onclick = function() { navigator.clipboard.writeText(c); el.classList.add('copied'); setTimeout(function(){el.classList.remove('copied')},500); showToast('Copied: ' + c); };
          pc.appendChild(el);
        });
        document.getElementById('popupFrom').textContent = from;
        popup.style.display = 'block';
      }

      function renderOtpList() {
        const container = document.getElementById('otpEmailList');
        const card = document.getElementById('otpResultCard');
        if (!container) return;
        if (receivedOtps.length === 0) { container.innerHTML = ''; card.style.display = 'none'; return; }
        card.style.display = 'block';
        container.innerHTML = '';
        const codes = [];
        receivedOtps.forEach(item => item.otps.forEach(c => codes.push(c)));
        codes.reverse().forEach(c => {
          const el = document.createElement('span');
          el.className = 'otp-chip';
          el.textContent = c;
          el.onclick = function() { navigator.clipboard.writeText(c); el.classList.add('copied'); setTimeout(function(){el.classList.remove('copied')},500); showToast('Copied: ' + c); };
          container.appendChild(el);
        });
        const style = document.getElementById('otpChipStyle') || document.createElement('style');
        style.id = 'otpChipStyle';
        style.textContent = '.otp-chip{background:#0a2a1a;border:1px solid #2a6a3a;color:#6f6;padding:0.6rem 1.2rem;border-radius:10px;font-family:monospace;font-weight:700;font-size:1.3rem;cursor:pointer;transition:all 0.2s;}.otp-chip:hover{background:#1a4a2a;border-color:#4a9a5a;}';
        document.head.appendChild(style);
      }

      function updateOtpBadge(count) {
        let badge = document.getElementById('otpBadge');
        if (count > 0) {
          if (!badge) {
            badge = document.createElement('span');
            badge.id = 'otpBadge';
            badge.style.cssText = 'position:fixed;top:1rem;left:1rem;background:#f04040;color:#fff;border-radius:50%;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;z-index:200;cursor:pointer;box-shadow:0 2px 12px rgba(240,64,64,0.5);';
            badge.onclick = () => { document.getElementById('otpPopup').style.display = 'block'; document.getElementById('otpPopup').style.display = 'block'; };
            document.body.appendChild(badge);
          }
          badge.textContent = count;
        } else if (badge) { badge.remove(); }
      }

      async function pollOtp() {
        if (!savedOtpEmail || !savedOtpPass) return;
        try {
          const res = await fetch('/api/fetch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: savedOtpEmail, password: savedOtpPass }),
          });
          const data = await res.json();
          if (data.error) { return; }
          if (data.otps) {
            const newOtps = data.otps.filter(o => !lastOtpIds.has(o.id));
            if (newOtps.length > 0) {
              newOtps.forEach(o => lastOtpIds.add(o.id));
              newOtps.slice(0, 3).forEach(o => {
                if (o.otps && o.otps.length > 0) showOtpPopup(o.otps, o.from);
              });
              updateOtpBadge(document.querySelectorAll('#otpBadge').length > 0 ? parseInt(document.getElementById('otpBadge').textContent) + newOtps.length : newOtps.length);
              document.getElementById('otpPollStatus').innerHTML = '<span style="color:#6f6;">✓ ' + new Date().toLocaleTimeString() + ' — ' + newOtps.length + ' new</span>';
            }
            if (!document.getElementById('otpPollStatus').dataset.initial) {
              document.getElementById('otpPollStatus').dataset.initial = '1';
              document.getElementById('otpPollStatus').innerHTML = '<span style="color:#888;">○ Waiting for new OTPs...</span>';
            }
          }
        } catch (e) {}
      }

      function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        lastOtpIds.clear();
        document.getElementById('otpPollStatus').dataset.initial = '';
        updateOtpBadge(0);
        pollOtp();
        pollTimer = setInterval(pollOtp, 12000);
      }

      function stopPolling() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        document.getElementById('otpPollStatus').innerHTML = '';
        document.getElementById('otpPollStatus').dataset.initial = '';
        document.getElementById('otpConnectBtn').style.display = '';
        document.getElementById('otpDisconnectBtn').style.display = 'none';
      }

      function init() {
        emailInput.addEventListener('keydown', handleKeydown);
        generateBtn.addEventListener('click', handleGenerate);
        refreshBtn.addEventListener('click', refresh);
        clearBtn.addEventListener('click', clearAll);
        copyAllBtn.addEventListener('click', function() {
          const state = loadState();
          const v = state.variations || [];
          const c = state.copied || {};
          if (v.length === 0) { showToast('No emails to copy'); return; }
          copyAll(v, c);
        });
        exportBtn.addEventListener('click', function() {
          const state = loadState();
          const v = state.variations || [];
          if (v.length === 0) { showToast('No emails to export'); return; }
          exportTxt(v);
        });

        const state = loadState();
        const v = state.variations || [];
        const c = state.copied || {};
        if (state.mainEmail) {
          currentEmail = state.mainEmail;
          emailInput.value = currentEmail;
        }
        if (v.length > 0) {
          currentVariations = v;
          render(v, c);
        }

        document.getElementById('otpConnectBtn').addEventListener('click', function() {
          const email = document.getElementById('otpEmailInput').value.trim();
          const pass = document.getElementById('otpPassInput').value.trim();
          if (!email || !pass) { showToast('Enter email and app password'); return; }
          savedOtpEmail = email;
          savedOtpPass = pass;
          localStorage.setItem('otp_creds', JSON.stringify({ email, pass }));
          document.getElementById('otpConnectBtn').style.display = 'none';
          document.getElementById('otpDisconnectBtn').style.display = '';
          document.getElementById('otpPollStatus').innerHTML = '<span style="color:#f0c040;">⟳ Connecting...</span>';
          startPolling();
        });

        document.getElementById('clearOtpListBtn').addEventListener('click', function() {
          receivedOtps.length = 0;
          renderOtpList();
          updateOtpBadge(0);
          showToast('Cleared');
        });

        document.getElementById('otpDisconnectBtn').addEventListener('click', function() {
          savedOtpEmail = ''; savedOtpPass = '';
          localStorage.removeItem('otp_creds');
          stopPolling();
          updateOtpBadge(0);
          lastOtpIds.clear();
          showToast('Disconnected');
        });

        const phoneNumbers = [];
        const phoneCopied = new Set();
        function renderPhones() {
          const el = document.getElementById('phoneList');
          if (!el) return;
          if (phoneNumbers.length === 0) { el.innerHTML = '<span style="color:#555;font-size:0.85rem;">No numbers</span>'; return; }
          el.innerHTML = '';
          phoneNumbers.forEach((p, i) => {
            const chip = document.createElement('span');
            chip.textContent = p;
            chip.style.cssText = 'background:' + (phoneCopied.has(i)?'#1a4a2a':'#14141e') + ';border:1px solid ' + (phoneCopied.has(i)?'#2a6a3a':'#333') + ';color:' + (phoneCopied.has(i)?'#6f6':'#e0e0e0') + ';padding:0.5rem 1rem;border-radius:8px;font-family:monospace;font-size:0.95rem;cursor:pointer;transition:all 0.2s;animation:popIn 0.3s ease;';
            chip.dataset.idx = i;
            chip.onclick = function() {
              const idx = parseInt(this.dataset.idx);
              navigator.clipboard.writeText(phoneNumbers[idx]);
              phoneCopied.add(idx);
              renderPhones();
              showToast('Copied: ' + phoneNumbers[idx]);
            };
            el.appendChild(chip);
          });
        }
        document.getElementById('phoneGenBtn').addEventListener('click', function() {
          const code = document.getElementById('countryCodeSelect').value;
          const count = parseInt(document.getElementById('phoneCountInput').value) || 20;
          phoneNumbers.length = 0; phoneCopied.clear();
          for (let i = 0; i < count; i++) {
            let digits = '';
            for (let j = 0; j < 10; j++) digits += Math.floor(Math.random() * 10);
            phoneNumbers.push(code + digits);
          }
          renderPhones();
          showToast('Generated ' + count + ' numbers');
        });
        document.getElementById('uploadBtn').addEventListener('click', function() {
          document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const ext = file.name.split('.').pop().toLowerCase();
          phoneNumbers.length = 0; phoneCopied.clear();
          if (ext === 'txt') {
            const reader = new FileReader();
            reader.onload = function(ev) {
              ev.target.result.split('\n').forEach(l => {
                const num = l.trim().replace(/[\s\-\(\)]/g, '');
                if (num) phoneNumbers.push(num);
              });
              renderPhones(); showToast('Loaded ' + phoneNumbers.length + ' numbers');
            };
            reader.readAsText(file);
          } else if (ext === 'xlsx' || ext === 'xls') {
            const reader = new FileReader();
            reader.onload = function(ev) {
              try {
                const wb = XLSX.read(ev.target.result, {type:'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(ws, {header:1});
                data.forEach(row => {
                  if (row && row.length) {
                    const cell = String(row[0]).trim().replace(/[\s\-\(\)]/g, '');
                    if (cell) phoneNumbers.push(cell);
                  }
                });
                renderPhones(); showToast('Loaded ' + phoneNumbers.length + ' numbers');
              } catch(err) { showToast('Error reading file'); }
            };
            reader.readAsArrayBuffer(file);
          }
        });

        const saved = localStorage.getItem('otp_creds');
          try {
            const c = JSON.parse(saved);
            if (c.email && c.pass) {
              document.getElementById('otpEmailInput').value = c.email;
              document.getElementById('otpPassInput').value = c.pass;
              savedOtpEmail = c.email;
              savedOtpPass = c.pass;
              document.getElementById('otpConnectBtn').style.display = 'none';
              document.getElementById('otpDisconnectBtn').style.display = '';
              document.getElementById('otpPollStatus').innerHTML = '<span style="color:#f0c040;">⟳ Reconnecting...</span>';
              startPolling();
            }
          } catch(e) {}
        }
      }

      init();
    })();
  </script>
</body>
</html>
